name: Generate VaultWise APK and AAB

env:
  main_project_module: app
  app_name: VaultWise

on:
  push:
    branches:
      - master
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build and Upload APK/AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set current date
        run: echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Set repository name
        run: echo "repository_name=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Give Gradle permission
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Build project
        run: ./gradlew build

      - name: Generate Debug APK
        run: ./gradlew assembleDebug

      - name: Generate Debug AAB
        run: ./gradlew bundleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.date_today }}-${{ env.app_name }}-Debug-APK
          path: ${{ env.main_project_module }}/build/outputs/apk/debug/*.apk

      - name: Upload Debug AAB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.date_today }}-${{ env.app_name }}-Debug-AAB
          path: ${{ env.main_project_module }}/build/outputs/bundle/debug/*.aab
